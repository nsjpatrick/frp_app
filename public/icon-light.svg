<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
  <!--
    PTI spiral favicon — light-mode variant (dark slate on transparent).

    Shown in browsers set to `prefers-color-scheme: light`. Safari ignores
    @media queries inside an SVG favicon, so we split into two files and
    route between them via media-queried <link> tags in app/layout.tsx.

    Design matches the Nav logomark (public/icon-dark.svg mirrors the
    colors) — five concentric right-angle curves + five tick marks — but
    coordinates are scaled to a tight 24×24 viewBox with a stroke-width
    of ~1.1 so the mark reads crisply at 16/32px favicon sizes. Keeping
    this on the same grid as the dark variant means cached favicons swap
    cleanly without any size jump.

    Colors here paint the PTI slate (#293338). DO NOT replace with an
    orange letter-P / starter-template mark — this is the brand mark and
    must stay the spiral + tick layout.
  -->
  <g fill="none" stroke="#293338" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 5.5 22 L 5.5 12 A 8 8 0 1 1 13.5 20" />
    <path d="M 7.0 22 L 7.0 12 A 6.5 6.5 0 1 1 13.5 18.5" />
    <path d="M 8.5 22 L 8.5 12 A 5 5 0 1 1 13.5 17" />
    <path d="M 10 22 L 10 12 A 3.5 3.5 0 1 1 13.5 15.5" />
    <path d="M 11.5 22 L 11.5 12 A 2 2 0 1 1 13.5 14" />
    <line x1="2" y1="20" x2="3.5" y2="20" />
    <line x1="2" y1="18.5" x2="3.5" y2="18.5" />
    <line x1="2" y1="17" x2="3.5" y2="17" />
    <line x1="2" y1="15.5" x2="3.5" y2="15.5" />
    <line x1="2" y1="14" x2="3.5" y2="14" />
  </g>
</svg>
